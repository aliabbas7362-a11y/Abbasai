<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Universal AI Chat - Accessible</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/+esm"></script>
    
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Google Fonts: Refined typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        code, pre {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }
        
        /* CSS Variables for theming */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: #ececf1;
            --text-primary: #0d0d0d;
            --text-secondary: #565869;
            --border-color: #d5d5e0;
            --accent-color: #1f2937;
            --message-user-bg: #0066cc;
            --message-ai-bg: #f1f5f9;
            --focus-outline: 3px solid #0066cc;
        }
        
        /* Dark mode variables */
        html.dark {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3a3a3a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b8;
            --border-color: #3a3a3a;
            --accent-color: #e0e0e0;
            --message-user-bg: #1e3a8a;
            --message-ai-bg: #374151;
            --focus-outline: 3px solid #60a5fa;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.2s, color 0.2s;
            overflow: hidden;
        }
        
        html {
            height: 100%;
            width: 100%;
        }
        
        /* Screen reader only text */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
        
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 1.125rem;
        }
        
        #app {
            display: none;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
        }
        
        #app.ready {
            display: flex;
        }
        
        /* Focus styles for keyboard navigation */
        button:focus,
        input:focus,
        textarea:focus {
            outline: var(--focus-outline);
            outline-offset: 2px;
        }
        
        /* High contrast mode support */
        @media (prefers-contrast: more) {
            body {
                --text-primary: #000000;
                --text-secondary: #333333;
            }
            
            html.dark {
                --text-primary: #ffffff;
                --text-secondary: #cccccc;
            }
        }
        
        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        /* Sidebar styles */
        .sidebar {
            background-color: var(--bg-primary);
            border-right: 1px solid var(--border-color);
            transition: transform 0.3s ease;
            overflow-y: auto;
            min-height: 100dvh;
        }
        
        /* Mobile sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 40;
        }
        
        .sidebar-overlay.active {
            display: block;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100dvh;
                width: 100%;
                max-width: 280px;
                z-index: 50;
                transform: translateX(-100%);
                border-right: none;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
        }
        
        /* Chat messages */
        .message {
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-content {
            line-height: 1.6;
        }
        
        .message-content p {
            margin-bottom: 0.75rem;
        }
        
        .message-content p:last-child {
            margin-bottom: 0;
        }
        
        .message-content ul, .message-content ol {
            margin-bottom: 0.75rem;
            margin-left: 1.5rem;
        }
        
        .message-content li {
            margin-bottom: 0.375rem;
        }
        
        .message-content code {
            background-color: var(--bg-tertiary);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.875em;
        }
        
        .message-content pre {
            background-color: var(--bg-secondary);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 0.75rem;
        }
        
        .message-content pre code {
            background-color: transparent;
            padding: 0;
            font-size: 0.875rem;
        }
        
        .message-content blockquote {
            border-left: 3px solid var(--text-secondary);
            padding-left: 1rem;
            margin: 0.75rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        
        .message-content h1, .message-content h2, .message-content h3,
        .message-content h4, .message-content h5, .message-content h6 {
            margin: 1rem 0 0.5rem 0;
            font-weight: 600;
        }
        
        .message-content h1 { font-size: 1.875rem; }
        .message-content h2 { font-size: 1.5rem; }
        .message-content h3 { font-size: 1.25rem; }
        .message-content h4 { font-size: 1.125rem; }
        .message-content h5 { font-size: 1rem; }
        .message-content h6 { font-size: 0.875rem; }
        
        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 0.375rem;
            padding: 1rem;
        }
        
        .typing-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background-color: var(--text-secondary);
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-0.5rem);
            }
        }
        
        /* Input area */
        .input-wrapper {
            background-color: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            padding: 1rem;
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }
        
        .input-area {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }
        
        .input-field {
            flex: 1;
            min-height: 44px;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            max-height: 150px;
            transition: border-color 0.2s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: var(--bg-primary);
        }
        
        .send-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            min-width: 44px;
            min-height: 44px;
            padding: 0;
            background-color: var(--accent-color);
            color: white;
            border: 2px solid transparent;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1.25rem;
            transition: opacity 0.2s, background-color 0.2s;
        }
        
        .send-button:hover:not(:disabled) {
            opacity: 0.8;
        }
        
        .send-button:focus {
            outline: var(--focus-outline);
            outline-offset: 2px;
        }
        
        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background-color: var(--bg-primary);
            border-radius: 0.75rem;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            max-height: 90dvh;
            overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .form-input, .form-textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
            min-height: 44px;
        }
        
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .form-hint {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
        
        .modal-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 2rem;
            justify-content: flex-end;
        }
        
        .button {
            padding: 0.75rem 1.5rem;
            border: 2px solid transparent;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.2s;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .button:focus {
            outline: var(--focus-outline);
            outline-offset: 2px;
        }
        
        .button-primary {
            background-color: var(--accent-color);
            color: white;
        }
        
        .button-primary:hover {
            opacity: 0.8;
        }
        
        .button-secondary {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .button-secondary:hover {
            opacity: 0.8;
        }
        
        /* Chat item in sidebar */
        .chat-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            word-break: break-word;
            user-select: none;
            min-height: 44px;
        }
        
        .chat-item:hover {
            background-color: var(--bg-tertiary);
        }
        
        .chat-item.active {
            background-color: var(--bg-tertiary);
            font-weight: 600;
            border-left: 3px solid var(--accent-color);
        }
        
        .chat-item-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
            font-size: inherit;
            color: inherit;
            cursor: pointer;
        }
        
        .chat-item-actions {
            display: flex;
            gap: 0.25rem;
            opacity: 0;
        }
        
        .chat-item:hover .chat-item-actions {
            opacity: 1;
        }
        
        .chat-item-btn {
            background: none;
            border: 2px solid transparent;
            cursor: pointer;
            padding: 0.5rem;
            color: var(--text-secondary);
            transition: color 0.2s;
            font-size: 1rem;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.375rem;
        }
        
        .chat-item-btn:hover {
            color: var(--text-primary);
        }
        
        .chat-item-btn:focus {
            outline: var(--focus-outline);
            outline-offset: 2px;
        }
        
        /* Hamburger button */
        .hamburger {
            display: none;
            background: none;
            border: 2px solid transparent;
            cursor: pointer;
            padding: 0.5rem;
            color: var(--text-primary);
            font-size: 1.5rem;
            min-width: 44px;
            min-height: 44px;
            border-radius: 0.375rem;
        }
        
        .hamburger:focus {
            outline: var(--focus-outline);
            outline-offset: 2px;
        }
        
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
        
        /* Top bar for mobile */
        .top-bar {
            display: none;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-primary);
            min-height: 56px;
        }
        
        @media (max-width: 768px) {
            .top-bar {
                display: flex;
            }
        }
        
        .top-bar-title {
            font-size: 1.125rem;
            font-weight: 600;
            flex: 1;
        }
        
        .settings-icon-btn {
            background: none;
            border: 2px solid transparent;
            cursor: pointer;
            padding: 0.5rem;
            color: var(--text-primary);
            font-size: 1.5rem;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.375rem;
        }
        
        .settings-icon-btn:focus {
            outline: var(--focus-outline);
            outline-offset: 2px;
        }
    </style>
</head>

            }
        }
        
        /* Sidebar styles */
        .sidebar {
            background-color: var(--bg-primary);
            border-right: 1px solid var(--border-color);
            transition: transform 0.3s ease;
            overflow-y: auto;
            min-height: 100dvh;
        }
        
        /* Mobile sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 40;
        }
        
        .sidebar-overlay.active {
            display: block;
        }
        
        @media (max-width: 768px) {

                position: fixed;
                left: 0;
                top: 0;
                height: 100dvh;
                width: 100%;
                max-width: 280px;
                z-index: 50;
                transform: translateX(-100%);
                border-right: none;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
        }
        
        /* Chat messages */
        .message {
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-content {

        .message-content p {

        .message-content p:last-child {
            margin-bottom: 0;
        }
        
        .message-content ul, .message-content ol {
            margin-bottom: 0.75rem;
            margin-left: 1.5rem;
        }
        
        .message-content li {
            margin-bottom: 0.375rem;
        }
        
        .message-content code {

            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.875em;
        }
        
        .message-content pre {
            background-color: var(--bg-secondary);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 0.75rem;
        }
        
        .message-content pre code {
            background-color: transparent;
            padding: 0;
            font-size: 0.875rem;
        }
        
        .message-content blockquote {
            border-left: 3px solid var(--text-secondary);
            padding-left: 1rem;
            margin: 0.75rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        
        .message-content h1, .message-content h2, .message-content h3,
        .message-content h4, .message-content h5, .message-content h6 {
            margin: 1rem 0 0.5rem 0;
            font-weight: 600;
        }
        
        .message-content h1 { font-size: 1.875rem; }
        .message-content h2 { font-size: 1.5rem; }
        .message-content h3 { font-size: 1.25rem; }
        .message-content h4 { font-size: 1.125rem; }
        .message-content h5 { font-size: 1rem; }
        .message-content h6 { font-size: 0.875rem; }
        
        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 0.375rem;
            padding: 1rem;

        .typing-dot {
            width: 0.5rem;
            height: 0.5rem;

            background-color: var(--text-secondary);
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-0.5rem);
            }
        }
        
        /* Input area */
        .input-wrapper {

        .input-area {
            display: flex;

            align-items: flex-end;
        }

            flex: 1;
            min-height: 44px;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            max-height: 150px;
            transition: border-color 0.2s;
        }
        
        .input-field:focus {

        }

            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1.25rem;
            transition: opacity 0.2s, background-color 0.2s;
        }
        
        .send-button:hover:not(:disabled) {
            opacity: 0.8;

        .send-button:focus {
            outline: var(--focus-outline);
            outline-offset: 2px;
        }
        
        .send-button:disabled {

        }
        
        .form-input, .form-textarea {

        }

        }
        
        .chat-item-btn:focus {
            outline: var(--focus-outline);
            outline-offset: 2px;
        }
        
        /* Hamburger button */
        .hamburger {
            display: none;
            background: none;
            border: 2px solid transparent;
            cursor: pointer;
            padding: 0.5rem;
            color: var(--text-primary);
            font-size: 1.5rem;
            min-width: 44px;
            min-height: 44px;
            border-radius: 0.375rem;

            outline-offset: 2px;
        }

                align-items: center;
                justify-content: center;
            }
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
        
        /* Top bar for mobile */
        .top-bar {
            display: none;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-primary);

        .settings-icon-btn {

        }
        
        .settings-icon-btn:focus {

            outline-offset: 2px;
